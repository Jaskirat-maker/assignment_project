# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/finance_dashboard?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT
app.jwt.secret=your_super_secret_key_minimum_64_characters_long_for_HS512_algorithm_finance
app.jwt.expiration=86400000

# Rate limiting
app.rate-limit.enabled=true
app.rate-limit.max-requests-per-client=120
app.rate-limit.max-global-requests=5000
app.rate-limit.max-concurrent-requests=200
app.rate-limit.window-seconds=60
app.rate-limit.include-paths[0]=/api/**

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.finance=DEBUG
logging.level.org.springframework.security=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=Finance Dashboard API
info.app.version=1.0.0