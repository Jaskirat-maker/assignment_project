spring.datasource.url=jdbc:h2:mem:financedb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

app.jwt.secret=test_secret_key_minimum_64_characters_long_for_hs512_algorithm_123456
app.jwt.expiration=3600000

app.rate-limit.enabled=true
app.rate-limit.max-requests-per-client=200
app.rate-limit.max-global-requests=1000
app.rate-limit.window-seconds=60
